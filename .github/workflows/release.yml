name: Release candidate

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Set up Java 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Set up Android command-line tools
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"
      - name: Restore release signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/voiceasset-upload.p12"
          chmod 600 "$RUNNER_TEMP/voiceasset-upload.p12"
      - name: Validate tag
        shell: bash
        run: |
          version=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -n 1)
          test -n "$version"
          tag_version=${GITHUB_REF_NAME#v}
          tag_version=${tag_version%%-*}
          tag_version=${tag_version%%+*}
          test "$tag_version" = "$version"
      - name: Test, lint, and build signed release APK and AAB
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/voiceasset-upload.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew ktlintCheck test lintRelease assembleRelease bundleRelease \
            :app:cyclonedxDirectBom --stacktrace
      - name: Validate and package release outputs
        shell: bash
        run: |
          bash scripts/package-release.sh "$GITHUB_REF_NAME" dist-release
          bash scripts/verify-release.sh "$GITHUB_REF_NAME" dist-release
      - name: Create or update draft prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            test "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)" = true
            gh release upload "$GITHUB_REF_NAME" dist-release/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist-release/* --verify-tag --draft --prerelease \
              --title "VoiceAsset Android $GITHUB_REF_NAME" \
              --notes "Signed APK/AAB candidate. Complete physical-device validation before publication."
          fi
